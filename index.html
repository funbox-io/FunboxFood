<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>수입식품 실시간 대시보드</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @keyframes flashNew {
      0%   { background-color: #fef08a; }
      70%  { background-color: #fef9c3; }
      100% { background-color: transparent; }
    }
    .row-new { animation: flashNew 2.5s ease-out; }
    .modal-backdrop { background: rgba(0,0,0,0.5); }
    .status-pass  { background:#dcfce7; color:#166534; }
    .status-review{ background:#dbeafe; color:#1e40af; }
    .status-fail  { background:#fee2e2; color:#991b1b; }
  </style>
</head>
<body class="bg-slate-50 text-slate-800">
  <header class="bg-white shadow-sm sticky top-0 z-10">
    <div class="max-w-7xl mx-auto px-4 py-3 flex items-center justify-between">
      <h1 class="text-xl font-bold">🍱 수입식품 실시간 대시보드</h1>
      <div class="flex items-center gap-3 text-sm">
        <span id="status-dot" class="inline-block w-2.5 h-2.5 rounded-full bg-gray-400"></span>
        <span id="status-text" class="text-slate-500">대기 중</span>
        <span id="last-updated" class="text-slate-400"></span>
        <button id="toggle-poll" class="px-3 py-1 rounded bg-slate-800 text-white">일시정지</button>
      </div>
    </div>
    <div id="country-bar" class="max-w-7xl mx-auto px-4 pb-3 flex flex-wrap gap-2"></div>
  </header>

  <main class="max-w-7xl mx-auto px-4 py-4">
    <div class="flex flex-wrap items-center gap-3 mb-3">
      <input id="search" type="text" placeholder="품목/수입자/제조사 검색…"
             class="flex-1 min-w-[220px] border rounded px-3 py-2" />
      <div class="text-sm text-slate-500">
        총 <span id="count-total" class="font-semibold">0</span>건 ·
        신규 <span id="count-new" class="font-semibold text-amber-600">0</span>건
      </div>
    </div>

    <div class="overflow-x-auto bg-white rounded-lg shadow-sm">
      <table class="w-full text-sm">
        <thead class="bg-slate-100 text-slate-600 text-left">
          <tr>
            <th class="px-3 py-2">날짜</th>
            <th class="px-3 py-2">수입국 / 반입항</th>
            <th class="px-3 py-2">품목</th>
            <th class="px-3 py-2">수입자 / 제조사</th>
            <th class="px-3 py-2">상태</th>
          </tr>
        </thead>
        <tbody id="table-body"></tbody>
      </table>
    </div>
  </main>

  <div id="modal" class="fixed inset-0 hidden items-center justify-center modal-backdrop z-20">
    <div class="bg-white rounded-lg max-w-lg w-full mx-4 p-5">
      <div class="flex justify-between items-start mb-3">
        <h2 class="text-lg font-bold" id="modal-title">상세 정보</h2>
        <button id="modal-close" class="text-slate-400 hover:text-slate-700 text-xl">&times;</button>
      </div>
      <div id="modal-body" class="space-y-2 text-sm"></div>
    </div>
  </div>

  <script type="module" src="app.js"></script>
</body>
</html>
